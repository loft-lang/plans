# Auto-add every newly-opened plan issue to the org project board
# "loft — plans & bugs" (project #1), so a new plan can't file invisibly (the
# built-in Projects auto-add wasn't catching new plans — e.g. #94).
#
# Reuses the org/repo secret PLANS_TOKEN — a fine-grained PAT / GitHub App with
# **Projects: write** (+ issues:read).  The default GITHUB_TOKEN CANNOT write an
# org-level Projects v2 board.
name: Add to project board

on:
  issues:
    types: [opened]

jobs:
  add:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/orgs/loft-lang/projects/1
          github-token: ${{ secrets.PLANS_TOKEN }}
